<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Apartment Tracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; font-size: 1.3rem; }
        .metric-card { background: white; border-radius: 12px; padding: 1.2rem 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .metric-card .value { font-size: 2rem; font-weight: 700; color: #0d6efd; }
        .metric-card .label { color: #6c757d; font-size: 0.9rem; }
        .apt-card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; height: 100%; }
        .apt-card img { width: 100%; height: 200px; object-fit: cover; }
        .apt-card .no-image { width: 100%; height: 200px; background: #e9ecef; display: flex; align-items: center; justify-content: center; color: #adb5bd; }
        .apt-card .card-body { padding: 1rem; }
        .score-badge { background: #fff3cd; color: #856404; border-radius: 20px; padding: 2px 10px; font-size: 0.85rem; font-weight: 600; }
        .amenity-tag { background: #e7f3ff; color: #0a58ca; border-radius: 20px; padding: 2px 10px; font-size: 0.8rem; margin-right: 4px; }
        .star-rating { color: #ffc107; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'dashboard' %}">🏠 Apartment Tracker</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link {% if 'apartment' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'apartments' %}">Apartments</a></li>
                <li class="nav-item"><a class="nav-link {% if 'roommate' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'roommates' %}">Roommates</a></li>
                <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'rate' %}active{% endif %}" href="{% url 'rate' %}">Rate</a></li>
                <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'compare' %}active{% endif %}" href="{% url 'compare' %}">Compare</a></li>
            </ul>
            <ul class="navbar-nav">
                {% if user.is_authenticated %}
                <li class="nav-item"><span class="nav-link text-light opacity-75">{{ user.username }}</span></li>
                <li class="nav-item">
                    <form method="post" action="{% url 'logout' %}" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-outline-light ms-2">Log out</button>
                    </form>
                </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>
<div class="container pb-5">
    {% for message in messages %}
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
